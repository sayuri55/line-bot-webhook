<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登録依頼 情報抽出</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 16px;
      color: #1a1a2e;
    }

    h1 {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #2d3561;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    /* API Key */
    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .api-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: monospace;
    }

    .api-row input:focus { border-color: #4a90e2; }

    .btn-save {
      padding: 10px 16px;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .btn-save:hover { background: #357abd; }

    .api-status {
      font-size: 0.75rem;
      margin-top: 6px;
      color: #4caf50;
    }

    /* Upload area */
    .upload-area {
      border: 2px dashed #c5cae9;
      border-radius: 10px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      background: #f8f9ff;
    }

    .upload-area:hover, .upload-area.drag-over {
      background: #e8edff;
      border-color: #4a90e2;
    }

    .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }

    .upload-text {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 4px;
    }

    .upload-sub {
      font-size: 0.75rem;
      color: #aaa;
    }

    #fileInput { display: none; }

    /* Preview */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid #e0e0e0;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 3px;
      right: 3px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* Extract button */
    .btn-extract {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.05em;
    }

    .btn-extract:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-extract:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 16px;
      color: #667eea;
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-copy {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-copy:hover { background: #388e3c; }
    .btn-copy.copied { background: #1976d2; }

    .result-text {
      background: #f8f9fa;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.9rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-all;
      color: #1a1a2e;
      min-height: 60px;
    }

    /* Error */
    .error-msg {
      background: #fff3f3;
      border: 1.5px solid #f28b82;
      border-radius: 8px;
      padding: 12px;
      color: #c62828;
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    /* Multiple results */
    .result-block {
      margin-bottom: 16px;
    }

    .result-block-title {
      font-size: 0.8rem;
      color: #667eea;
      font-weight: 600;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<h1>📋 登録依頼 情報抽出</h1>

<!-- API Key Card -->
<div class="card">
  <div class="card-title">Anthropic API Key</div>
  <div class="api-row">
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
    <button class="btn-save" onclick="saveApiKey()">保存</button>
  </div>
  <div class="api-status" id="apiStatus"></div>
</div>

<!-- Upload Card -->
<div class="card">
  <div class="card-title">写真をアップロード</div>
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()"
       ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <div class="upload-icon">📷</div>
    <div class="upload-text">写真をタップして選択</div>
    <div class="upload-sub">またはここにドラッグ&ドロップ（複数枚OK）</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
  <div class="preview-grid" id="previewGrid"></div>
</div>

<!-- Extract Button -->
<button class="btn-extract" id="extractBtn" onclick="extract()" disabled>
  情報を抽出する
</button>

<!-- Loading -->
<div class="loading" id="loading">
  <span class="spinner"></span>情報を読み取り中...
</div>

<!-- Error -->
<div class="error-msg" id="errorMsg"></div>

<!-- Results -->
<div id="resultsArea"></div>

<script>
  const STORAGE_KEY = 'anthropic_api_key';
  let files = [];

  // Load saved API key
  window.addEventListener('load', () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('apiStatus').textContent = '✓ APIキーが保存されています';
    }
  });

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { alert('APIキーを入力してください'); return; }
    localStorage.setItem(STORAGE_KEY, key);
    document.getElementById('apiStatus').textContent = '✓ 保存しました';
  }

  function getApiKey() {
    return document.getElementById('apiKeyInput').value.trim() || localStorage.getItem(STORAGE_KEY) || '';
  }

  // Drag & Drop
  function onDragOver(e) {
    e.preventDefault();
    document.getElementById('uploadArea').classList.add('drag-over');
  }

  function onDragLeave(e) {
    document.getElementById('uploadArea').classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    document.getElementById('uploadArea').classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  }

  function handleFiles(newFiles) {
    for (const f of newFiles) {
      if (!f.type.startsWith('image/')) continue;
      files.push(f);
      addPreview(f, files.length - 1);
    }
    updateExtractBtn();
  }

  function addPreview(file, index) {
    const grid = document.getElementById('previewGrid');
    const reader = new FileReader();
    reader.onload = (e) => {
      const item = document.createElement('div');
      item.className = 'preview-item';
      item.dataset.index = index;
      item.innerHTML = `
        <img src="${e.target.result}" alt="preview">
        <button class="remove-btn" onclick="removeFile(${index})">✕</button>
      `;
      grid.appendChild(item);
    };
    reader.readAsDataURL(file);
  }

  function removeFile(index) {
    files[index] = null;
    const item = document.querySelector(`.preview-item[data-index="${index}"]`);
    if (item) item.remove();
    updateExtractBtn();
  }

  function updateExtractBtn() {
    const active = files.filter(f => f !== null);
    document.getElementById('extractBtn').disabled = active.length === 0;
  }

  // Convert file to base64
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  const PROMPT = `この画像から情報を抽出して、以下のフォーマットに当てはめて出力してください。
該当する情報が見つからない場合はその項目を空白のままにしてください。
フォーマット以外の文章は一切出力しないでください。

（登録契約情報）
・生年月日：
・代表者名：
・カナ：
・会社名：
・郵便番号：
・住所：
・電話番号：


①＝マッチング情報＝
・地番：
・住所：
・名義：
・カナ：
電力会社：
客番：
容量：
適用月：
使用量：`;

  async function callClaude(apiKey, base64Image, mediaType) {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: {
                type: 'base64',
                media_type: mediaType,
                data: base64Image
              }
            },
            {
              type: 'text',
              text: PROMPT
            }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `APIエラー: ${response.status}`);
    }

    const data = await response.json();
    return data.content[0].text;
  }

  async function extract() {
    const apiKey = getApiKey();
    if (!apiKey) {
      showError('APIキーを入力・保存してください');
      return;
    }

    const activeFiles = files.filter(f => f !== null);
    if (activeFiles.length === 0) {
      showError('写真を選択してください');
      return;
    }

    hideError();
    document.getElementById('loading').style.display = 'block';
    document.getElementById('extractBtn').disabled = true;
    document.getElementById('resultsArea').innerHTML = '';

    try {
      const results = [];

      for (let i = 0; i < activeFiles.length; i++) {
        const file = activeFiles[i];
        const base64 = await toBase64(file);
        const mediaType = file.type || 'image/jpeg';
        const text = await callClaude(apiKey, base64, mediaType);
        results.push({ name: file.name, text });
      }

      renderResults(results);
    } catch (err) {
      showError(err.message);
    } finally {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('extractBtn').disabled = false;
      updateExtractBtn();
    }
  }

  function renderResults(results) {
    const area = document.getElementById('resultsArea');
    area.innerHTML = '';

    if (results.length === 1) {
      // Single result — simple view
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="result-header">
          <span class="result-label">抽出結果</span>
          <button class="btn-copy" id="copyBtn0" onclick="copyText(0)">
            📋 コピー
          </button>
        </div>
        <div class="result-text" id="resultText0">${escapeHtml(results[0].text)}</div>
      `;
      area.appendChild(card);
    } else {
      // Multiple results
      results.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="result-block-title">📄 ${escapeHtml(r.name)}</div>
          <div class="result-header">
            <span class="result-label">抽出結果 ${i + 1}/${results.length}</span>
            <button class="btn-copy" id="copyBtn${i}" onclick="copyText(${i})">
              📋 コピー
            </button>
          </div>
          <div class="result-text" id="resultText${i}">${escapeHtml(r.text)}</div>
        `;
        area.appendChild(card);
      });

      // All copy button if multiple
      const allCard = document.createElement('div');
      allCard.className = 'card';
      allCard.innerHTML = `
        <div class="result-header">
          <span class="result-label">全件まとめてコピー</span>
          <button class="btn-copy" id="copyBtnAll" onclick="copyAll()">
            📋 全部コピー
          </button>
        </div>
      `;
      area.appendChild(allCard);
    }

    // Scroll to results
    area.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Store results globally for copy
  let extractedResults = [];

  const origRenderResults = renderResults;
  window.renderResults = function(results) {
    extractedResults = results;
    origRenderResults(results);
  };

  function copyText(index) {
    const text = document.getElementById(`resultText${index}`).textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(`copyBtn${index}`);
      btn.textContent = '✓ コピー済み';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = '📋 コピー';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      const btn = document.getElementById(`copyBtn${index}`);
      btn.textContent = '✓ コピー済み';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = '📋 コピー';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function copyAll() {
    const all = extractedResults.map((r, i) =>
      extractedResults.length > 1 ? `【${i + 1}件目】\n${r.text}` : r.text
    ).join('\n\n');
    navigator.clipboard.writeText(all).then(() => {
      const btn = document.getElementById('copyBtnAll');
      btn.textContent = '✓ コピー済み';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = '📋 全部コピー';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>

</body>
</html>
